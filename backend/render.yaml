services:
  - type: web
    name: guardian-llm
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn backend.app:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: guardian-llm-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: guardian-llm-db
    databaseName: guardianllm
    user: guardianllm
```

**1b. Add `gunicorn` to your `requirements.txt`:**
```
gunicorn>=21.2.0